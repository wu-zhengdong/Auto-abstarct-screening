name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-source:
    name: Source local install package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Package source launcher
        run: |
          mkdir -p artifacts/source
          rsync -a \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".venv" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            --exclude "build" \
            --exclude "dist" \
            --exclude "data" \
            --exclude "data_legacy_*" \
            --exclude "literatures" \
            --exclude "tmp" \
            --exclude ".env" \
            ./ artifacts/source/LLM_Abstract_Screening_Source/
          cd artifacts/source
          zip -r ../LLM_Abstract_Screening_Source_Local_Install.zip LLM_Abstract_Screening_Source

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: LLM_Abstract_Screening_Source_Local_Install
          path: artifacts/LLM_Abstract_Screening_Source_Local_Install.zip

  build-windows:
    name: Windows exe
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Build exe
        shell: pwsh
        run: .\build_windows_exe.ps1

      - name: Package exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Compress-Archive -Path "dist\LLM_Abstract_Screening.exe" -DestinationPath "artifacts\LLM_Abstract_Screening_Windows_x64.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: LLM_Abstract_Screening_Windows_x64
          path: artifacts/LLM_Abstract_Screening_Windows_x64.zip

  build-macos:
    name: macOS app
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Build app
        run: ./build_mac_app.sh

      - name: Package app
        run: |
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "dist/LLM Abstract Screening.app" "artifacts/LLM_Abstract_Screening_macOS_arm64.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: LLM_Abstract_Screening_macOS_arm64
          path: artifacts/LLM_Abstract_Screening_macOS_arm64.zip

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - package-source
      - build-windows
      - build-macos
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download packaged apps
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts/*.zip \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes "Desktop builds for Windows and macOS. These builds are unsigned, so Windows SmartScreen or macOS Gatekeeper may show a first-run warning."
